<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>knoop</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: #fafafa; color: #222; }
  #cy { position: absolute; inset: 0; }
  #title { position: fixed; top: 12px; left: 16px; font-weight: 600; font-size: 14px; letter-spacing: 0.3px; z-index: 2; }
  #title .tag { font-weight: 400; color: #888; margin-left: 10px; font-size: 12px; }
  #info  { position: fixed; bottom: 10px; left: 16px; font-size: 11px; color: #999; z-index: 2; }
  #legend { position: fixed; top: 12px; right: 16px; font-size: 12px; color: #555; z-index: 2; }
  #legend .row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  #detail { position: fixed; bottom: 10px; right: 16px; max-width: 320px; font-size: 12px; color: #333; background: #fff; border: 1px solid #eee; padding: 8px 10px; border-radius: 4px; display: none; z-index: 2; }
  #empty  { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div id="title">knoop<span class="tag">thinking substrate</span></div>
<div id="legend"></div>
<div id="info">drag to pan · scroll to zoom · click a node</div>
<div id="detail"></div>
<div id="cy"></div>
<script>
const PALETTE = {
  person: '#4c78a8',
  concept: '#f58518',
  project: '#54a24b',
  fragment: '#9aa0a6',
  organization: '#b279a2',
  tool: '#72b7b2',
};
const FALLBACK = '#888';
const color = k => PALETTE[k] || FALLBACK;

fetch('/graph.json').then(r => r.json()).then(data => {
  if (!data.nodes || data.nodes.length === 0) {
    const el = document.createElement('div'); el.id = 'empty';
    el.textContent = 'no tokens yet — capture a fragment and refresh';
    document.body.appendChild(el);
    return;
  }

  const kinds = [...new Set(data.nodes.map(n => n.data.kind))].sort();
  document.getElementById('legend').innerHTML = kinds.map(
    k => `<div class="row"><div class="dot" style="background:${color(k)}"></div>${k}</div>`
  ).join('');

  const styles = [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'background-color': FALLBACK,
        'color': '#222',
        'font-size': 11,
        'text-valign': 'bottom',
        'text-halign': 'center',
        'text-margin-y': 4,
        'text-wrap': 'wrap',
        'text-max-width': 140,
        'width': 22, 'height': 22,
        'border-width': 0,
      }
    },
    ...kinds.map(k => ({
      selector: `node[kind = "${k}"]`,
      style: { 'background-color': color(k) }
    })),
    {
      selector: 'edge',
      style: {
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'line-color': '#d0d0d0',
        'target-arrow-color': '#d0d0d0',
        'width': 1.2,
        'label': 'data(label)',
        'font-size': 9,
        'color': '#888',
        'text-rotation': 'autorotate',
        'text-background-color': '#fafafa',
        'text-background-opacity': 0.9,
        'text-background-padding': 2,
      }
    },
    {
      selector: ':selected',
      style: { 'border-width': 2, 'border-color': '#333', 'line-color': '#555', 'target-arrow-color': '#555' }
    },
  ];

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: data,
    style: styles,
    layout: { name: 'cose', animate: true, fit: true, padding: 60, nodeRepulsion: 9000, idealEdgeLength: 110 },
  });

  const detail = document.getElementById('detail');
  cy.on('tap', 'node', evt => {
    const d = evt.target.data();
    detail.style.display = 'block';
    detail.innerHTML = `<div style="font-weight:600">${d.label}</div><div style="color:#888">${d.kind} · id ${d.id}</div>`;
  });
  cy.on('tap', evt => { if (evt.target === cy) detail.style.display = 'none'; });
});
</script>
</body>
</html>
